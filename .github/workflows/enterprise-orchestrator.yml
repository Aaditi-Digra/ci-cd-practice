name:  project2

on: push

jobs: 
  build:
    runs-on: ubuntu-latest

    steps: 
      - name:  get code
        uses:  actions/checkout@v7

      - name: Set up Nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install    

      - name: Build
        run: npm run build

      - name: Run test
        run: npm test
          
      - name: Deploy
        run: echo "deploying to production server..."


