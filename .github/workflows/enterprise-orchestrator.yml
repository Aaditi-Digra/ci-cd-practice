name:  CI-WORKFLOW

on: 
  push:

jobs: 
  build:
    runs-on: ubuntu-latest

    steps: 
      - name:  checkout code
        uses:  actions/checkout@v7

      - name: Set up Nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install    

      - name: Build Application
        run: npm run build

 test: 
   needs: build
   runs-on: ubuntu-latest

   steps: 
      - name:  checkout code
        uses:  actions/checkout@v7

      - name: Set up Nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install    

      - name: Run tests
        run: npm test

